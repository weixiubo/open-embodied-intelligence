name: OpenEI CI

on:
  push:
    branches:
      - openei-next
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]

      - name: Lint
        run: python -m ruff check src/openei tests

      - name: Type check
        run: python -m mypy src/openei

      - name: Test
        run: python -m pytest -q

